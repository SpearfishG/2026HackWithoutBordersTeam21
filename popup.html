<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Culture Correlation Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 260px;
      padding: 14px;
      margin: 0;
      background: #ffffff;
    }

    h2 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #222;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
    }

    select {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 9px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #6d28d9;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: green;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>Culture Filter</h2>

  <label for="countrySelect">Choose a country:</label>
  <select id="countrySelect">
    <option value="Any">Any culture</option>
    <option value="Italy">Italy</option>
    <option value="Japan">Japan</option>
    <option value="India">India</option>
    <option value="China">China</option>
    <option value="Nigeria">Nigeria</option>
    <option value="Mexico">Mexico</option>
    <option value="France">France</option>
    <option value="Brazil">Brazil</option>
    <option value="Egypt">Egypt</option>
    <option value="Turkey">Turkey</option>
    <option value="Korea">Korea</option>
  </select>

  <button id="saveBtn">Save</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
